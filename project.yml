name: TabletBasic
options:
  bundleIdPrefix: com.tabletbasic
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  QBEngine:
    path: QBEngine
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2026070301"
targets:
  TabletBasic:
    type: application
    platform: iOS
    supportedDestinations:
      - iOS
      - macCatalyst
    sources:
      - QuickBasic
    dependencies:
      - package: QBEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tabletbasic.app
        INFOPLIST_KEY_CFBundleDisplayName: TabletBasic
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_PREVIEWS: YES
    info:
      path: QuickBasic/Info.plist
      properties:
        CFBundleDisplayName: TabletBasic
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.education
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        ITSAppUsesNonExemptEncryption: false
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.tabletbasic.bas
            UTTypeDescription: TabletBasic Program
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - bas
              public.mime-type:
                - text/plain
        CFBundleDocumentTypes:
          - CFBundleTypeName: BASIC Program
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.tabletbasic.bas
              - public.plain-text
            CFBundleTypeExtensions:
              - bas
  TabletBasicTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TabletBasicTests
    dependencies:
      - target: TabletBasic
      - package: QBEngine
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tabletbasic.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TabletBasic.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TabletBasic"
        BUNDLE_LOADER: "$(TEST_HOST)"
  TabletBasicUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - TabletBasicUITests
    dependencies:
      - target: TabletBasic
      - package: QBEngine
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tabletbasic.app.uitests
        TEST_TARGET_NAME: TabletBasic
schemes:
  TabletBasic:
    build:
      targets:
        TabletBasic: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TabletBasicTests
        - TabletBasicUITests