name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Xcode
        id: xcode
        run: |
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            echo "DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer" >> "$GITHUB_ENV"
            echo "available=true" >> "$GITHUB_OUTPUT"
          elif xcode-select -p >/dev/null 2>&1; then
            echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Xcode not found; skipping xcodegen, xcodebuild, and app unit tests."
          fi

      - name: Install XcodeGen
        if: steps.xcode.outputs.available == 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.xcode.outputs.available == 'true'
        run: xcodegen generate

      - name: QBEngine tests
        run: |
          cd QBEngine
          swift test

      - name: Build TabletBasic
        if: steps.xcode.outputs.available == 'true'
        run: ./scripts/build.sh

      - name: TabletBasic unit tests
        if: steps.xcode.outputs.available == 'true'
        run: |
          DESTINATION="$(./scripts/xcode-destination.sh ipad)"
          xcodebuild -project TabletBasic.xcodeproj -scheme TabletBasic \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:TabletBasicTests \
            test