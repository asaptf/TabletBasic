      <rect x="286" y="746" width="52" height="18" rx="6"/>
      <rect x="360" y="746" width="52" height="18" rx="6"/>
      <rect x="434" y="746" width="52" height="18" rx="6"/>
      <rect x="508" y="746" width="52" height="18" rx="6"/>
      <rect x="582" y="746" width="52" height="18" rx="6"/>
      <rect x="656" y="746" width="52" height="18" rx="6"/>
      <rect x="318" y="786" width="388" height="18" rx="6"/>
