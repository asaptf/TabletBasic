      <rect x="342" y="564" width="92" height="20" rx="4"/>
      <rect x="456" y="564" width="152" height="20" rx="4"/>
      <rect x="630" y="564" width="78" height="20" rx="4"/>
      <rect x="300" y="600" width="30" height="20" rx="4"/>
      <rect x="342" y="600" width="116" height="20" rx="4"/>
