<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">TabletBasic app icon</title>
  <desc id="desc">A retro BASIC terminal glowing on a tablet, with a pixel TB monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="128" y1="80" x2="900" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12214a"/>
      <stop offset="0.45" stop-color="#0a2730"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <radialGradient id="halo" cx="512" cy="458" r="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#56f5c8" stop-opacity="0.42"/>
      <stop offset="0.54" stop-color="#11a8cc" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#071018" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tablet" x1="196" y1="180" x2="828" y2="840" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#273449"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#080c14"/>
    </linearGradient>
    <linearGradient id="screen" x1="232" y1="236" x2="792" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c3d36"/>
      <stop offset="0.48" stop-color="#06221f"/>
      <stop offset="1" stop-color="#031116"/>
    </linearGradient>
    <linearGradient id="key" x1="236" y1="720" x2="788" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#223149"/>
      <stop offset="1" stop-color="#121928"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="screenGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#58ffd2" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#halo)"/>

  <g opacity="0.12">
    <path d="M96 224H928M96 320H928M96 416H928M96 512H928M96 608H928M96 704H928M96 800H928" stroke="#7fffe0" stroke-width="2"/>
    <path d="M160 96V928M256 96V928M352 96V928M448 96V928M544 96V928M640 96V928M736 96V928M832 96V928" stroke="#7fffe0" stroke-width="2"/>
  </g>

