      <rect x="510" y="324" width="116" height="32" rx="6"/>
      <rect x="626" y="356" width="38" height="54" rx="6"/>
      <rect x="510" y="410" width="116" height="32" rx="6"/>
      <rect x="626" y="442" width="38" height="58" rx="6"/>
      <rect x="510" y="500" width="116" height="32" rx="6"/>
